name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Swift version
        run: swift --version

      - name: Install lint and format tools
        run: brew install swiftlint swiftformat

      - name: Check format
        run: swiftformat --lint .

      - name: Lint
        run: swiftlint lint --strict --no-cache

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test
